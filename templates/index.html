<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <!-- Left sidebar ad -->
    <aside class="sidebar sidebar-left">
        <div class="ad-slot" id="ad-left"></div>
    </aside>

    <main class="game-container">
        <h1>Rock Paper Scissors</h1>
        <p class="subtitle">vs JOHNNY5</p>

        <div class="scoreboard">
            <span>YOU: <strong id="score-player">0</strong></span>
            <span>JOHNNY5: <strong id="score-ai">0</strong></span>
            <span>Round: <strong id="round">0</strong></span>
        </div>

        <div class="moves">
            <button class="move-btn" data-move="rock">Rock</button>
            <button class="move-btn" data-move="paper">Paper</button>
            <button class="move-btn" data-move="scissors">Scissors</button>
        </div>

        <div class="result-area" id="result-area"></div>
    </main>

    <!-- Right sidebar ad -->
    <aside class="sidebar sidebar-right">
        <div class="ad-slot" id="ad-right"></div>
    </aside>

    <!-- Banner ad -->
    <div class="banner-ad" id="banner-ad"></div>

    <script src="/static/a3f9k2.js"></script>
</body>
</html>
